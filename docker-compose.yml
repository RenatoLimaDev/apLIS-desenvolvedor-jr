services:
  mysql:
    image: mysql:8.0
    container_name: aplis-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: aplis
      MYSQL_USER: aplis
      MYSQL_PASSWORD: aplis
    ports:
      - "3306:3306"
    volumes:
      - aplis-mysql-data:/var/lib/mysql
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uaplis", "-paplis"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  aplis-mysql-data:
